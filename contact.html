    <style>
        body.contact-page {
            background:
                radial-gradient(circle, rgba(255, 255, 255, 0.11) 1px, transparent 1.6px) 0 0 / 28px 28px,
                linear-gradient(180deg, #151313 0%, #111010 100%);
        }

        .contact-page .page-frame {
            background: rgba(20, 18, 18, 0.88);
        }

        .contact-layout {
            width: min(100%, 930px);
            margin: 54px auto 0;
            display: grid;
            grid-template-columns: 1fr;
            justify-items: center;
        }

        .contact-panel {
            width: min(100%, 640px);
        }

        .contact-heading {
            font-size: clamp(2.1rem, 4vw, 3rem);
            margin-bottom: 8px;
        }

        .contact-intro {
            color: var(--muted);
            font-size: 1.12rem;
            margin-bottom: 26px;
        }

        .contact-table {
            display: grid;
            gap: 18px;
        }

        .contact-row {
            display: grid;
            grid-template-columns: 120px minmax(0, 1fr);
            gap: 26px;
            align-items: baseline;
        }

        .contact-key {
            color: rgba(236, 230, 230, 0.55);
            font-size: 1.18rem;
        }

        .contact-value {
            min-width: 0;
        }

        .contact-value a {
            display: inline-block;
            color: var(--text);
            font-size: 1.24rem;
            font-weight: 600;
            border-bottom: 1px solid rgba(236, 230, 230, 0.28);
            padding-bottom: 3px;
        }

        .contact-value a:hover {
            color: var(--accent-strong);
            border-bottom-color: rgba(239, 208, 246, 0.55);
        }

        .home-link {
            display: inline-block;
            margin-top: 34px;
            color: rgba(236, 230, 230, 0.55);
            font-size: 1.28rem;
        }

        .home-link:hover {
            color: var(--text);
        }

        @media (max-width: 720px) {
            .contact-layout {
                margin-top: 26px;
            }

            .contact-panel {
                width: 100%;
            }

            .contact-row {
                grid-template-columns: 1fr;
                gap: 6px;
            }

            .contact-key {
                font-size: 1rem;
            }

            .contact-value a {
                font-size: 1.08rem;
                word-break: break-word;
            }
        }
    </style>
</head>
