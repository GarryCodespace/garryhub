    <script type="module">
        import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs";

        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs";

        const gallery = document.getElementById("portfolio-gallery");
        const portfolioUrl = "Garry-Yuan-Engineering-Portfolio.pdf";

        async function renderPortfolio() {
            try {
                const loadingTask = pdfjsLib.getDocument(portfolioUrl);
                const pdf = await loadingTask.promise;
                gallery.innerHTML = "";

                for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
                    const page = await pdf.getPage(pageNumber);
                    const viewport = page.getViewport({ scale: 1 });
                    const containerWidth = Math.min(gallery.clientWidth || 980, 980);
                    const scale = containerWidth / viewport.width;
                    const scaledViewport = page.getViewport({ scale });

                    const pageWrap = document.createElement("section");
                    pageWrap.className = "portfolio-page";

                    const canvas = document.createElement("canvas");
                    const context = canvas.getContext("2d");
                    canvas.width = Math.floor(scaledViewport.width * window.devicePixelRatio);
                    canvas.height = Math.floor(scaledViewport.height * window.devicePixelRatio);
                    canvas.style.width = `${Math.floor(scaledViewport.width)}px`;
                    canvas.style.height = `${Math.floor(scaledViewport.height)}px`;
                    context.setTransform(window.devicePixelRatio, 0, 0, window.devicePixelRatio, 0, 0);

                    await page.render({
                        canvasContext: context,
                        viewport: scaledViewport
                    }).promise;

                    pageWrap.appendChild(canvas);
                    gallery.appendChild(pageWrap);
                }
            } catch (error) {
                gallery.innerHTML = `<div class="panel">Could not render the portfolio inline. You can still <a href="${portfolioUrl}" target="_blank" rel="noopener noreferrer">open the PDF directly</a>.</div>`;
                console.error(error);
            }
        }

        renderPortfolio();
        window.addEventListener("resize", () => {
            clearTimeout(window.__portfolioResizeTimer);
            window.__portfolioResizeTimer = setTimeout(renderPortfolio, 180);
        });
    </script>
