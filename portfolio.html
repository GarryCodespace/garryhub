    <script type="module">
        import * as pdfjsLib from "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.min.mjs";

        pdfjsLib.GlobalWorkerOptions.workerSrc = "https://cdn.jsdelivr.net/npm/pdfjs-dist@4.4.168/build/pdf.worker.min.mjs";

        const gallery = document.getElementById("portfolio-gallery");
        const portfolioUrl = "Garry-Yuan-Engineering-Portfolio.pdf";
        const renderedPages = new Map();
        let pdfDocumentPromise;
        let pageObserver;

        function getPdfDocument() {
            if (!pdfDocumentPromise) {
                pdfDocumentPromise = pdfjsLib.getDocument(portfolioUrl).promise;
            }
            return pdfDocumentPromise;
        }

        function getRenderScale(page, shellWidth) {
            const viewport = page.getViewport({ scale: 1 });
            const width = Math.min(shellWidth || 980, 980);
            return width / viewport.width;
        }

        async function renderPage(pageNumber, shell, placeholder, force = false) {
            const pdf = await getPdfDocument();
            const page = await pdf.getPage(pageNumber);
            const shellWidth = shell.clientWidth || gallery.clientWidth || 980;
            const scale = getRenderScale(page, shellWidth);
            const roundedScale = Math.round(scale * 1000) / 1000;

            if (!force && renderedPages.get(pageNumber) === roundedScale && shell.querySelector("canvas")) {
                return;
            }

            const viewport = page.getViewport({ scale: roundedScale });
            const outputScale = Math.min(window.devicePixelRatio || 1, 1.35);
            const canvas = document.createElement("canvas");
            const context = canvas.getContext("2d");
            canvas.width = Math.floor(viewport.width * outputScale);
            canvas.height = Math.floor(viewport.height * outputScale);
            canvas.style.width = `${Math.floor(viewport.width)}px`;
            canvas.style.height = `${Math.floor(viewport.height)}px`;
            context.setTransform(outputScale, 0, 0, outputScale, 0, 0);

            shell.style.minHeight = `${Math.floor(viewport.height)}px`;

            await page.render({
                canvasContext: context,
                viewport
            }).promise;

            shell.innerHTML = "";
            shell.appendChild(canvas);
            renderedPages.set(pageNumber, roundedScale);
            if (placeholder) {
                placeholder.remove();
            }
        }

        function buildPlaceholder(label) {
            const placeholder = document.createElement("div");
            placeholder.className = "portfolio-page-placeholder";
            placeholder.textContent = label;
            placeholder.style.minHeight = "420px";
            return placeholder;
        }

        async function buildPortfolioShells() {
            const pdf = await getPdfDocument();
            gallery.innerHTML = "";

            for (let pageNumber = 1; pageNumber <= pdf.numPages; pageNumber += 1) {
                const pageWrap = document.createElement("section");
                pageWrap.className = "portfolio-page";

                const shell = document.createElement("div");
                shell.className = "portfolio-page-shell";
                shell.dataset.pageNumber = String(pageNumber);

                const placeholder = buildPlaceholder(`Loading page ${pageNumber}…`);
                shell.appendChild(placeholder);
                pageWrap.appendChild(shell);
                gallery.appendChild(pageWrap);
            }

            const shells = [...gallery.querySelectorAll(".portfolio-page-shell")];
            if (pageObserver) {
                pageObserver.disconnect();
            }

            pageObserver = new IntersectionObserver((entries) => {
                entries.forEach((entry) => {
                    if (!entry.isIntersecting) {
                        return;
                    }

                    const shell = entry.target;
                    const pageNumber = Number(shell.dataset.pageNumber);
                    const placeholder = shell.querySelector(".portfolio-page-placeholder");
                    renderPage(pageNumber, shell, placeholder).catch(console.error);
                    pageObserver.unobserve(shell);
                });
            }, {
                rootMargin: "300px 0px"
            });

            shells.forEach((shell) => pageObserver.observe(shell));

            const firstShell = shells[0];
            if (firstShell) {
                renderPage(1, firstShell, firstShell.querySelector(".portfolio-page-placeholder"), true).catch(console.error);
            }
        }

        async function renderPortfolio() {
            try {
                await buildPortfolioShells();
            } catch (error) {
                gallery.innerHTML = `<div class="panel">Could not render the portfolio inline. You can still <a href="${portfolioUrl}" target="_blank" rel="noopener noreferrer">open the PDF directly</a>.</div>`;
                console.error(error);
            }
        }

        renderPortfolio();
        window.addEventListener("resize", () => {
            clearTimeout(window.__portfolioResizeTimer);
            window.__portfolioResizeTimer = setTimeout(async () => {
                const shells = [...gallery.querySelectorAll(".portfolio-page-shell")];
                for (const shell of shells) {
                    const pageNumber = Number(shell.dataset.pageNumber);
                    if (!renderedPages.has(pageNumber)) {
                        continue;
                    }
                    await renderPage(pageNumber, shell, null, true);
                }
            }, 220);
        });
    </script>
